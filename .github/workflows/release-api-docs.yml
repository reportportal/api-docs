name: Release API Docs

on:
  workflow_dispatch:

concurrency:
  group: release-api-docs
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch API specs
        run: npm run fetch-api-docs

      - name: Validate API specs
        run: npm run validate-api-docs:silent

      - name: Regenerate MDX from specs
        run: npm run re-gen

      - name: Build Docusaurus
        run: npm run build

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain apis/ api-docs/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes to develop
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.email "support@reportportal.io"
          git config --global user.name "reportportal.io"
          git add apis/ api-docs/
          git commit -m "Release API docs"
          git push origin develop

      - name: Create PR develop → main
        if: steps.changes.outputs.changed == 'true'
        env:
          # Use a PAT or GitHub App token instead of the default GITHUB_TOKEN if
          # creating this PR must trigger downstream workflows.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list \
            --head develop \
            --base main \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #$existing_pr"
            exit 0
          fi

          echo "No PR found. Creating one..."

          gh pr create \
            --base main \
            --head develop \
            --title "Release API docs" \
            --body "Automated release of API specs and generated MDX docs. Triggered by \`workflow_dispatch\`."
